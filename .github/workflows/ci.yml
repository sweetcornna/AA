name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + property tests (packages/shared)
        run: npm test
      - name: Web build
        run: npm run build --workspace=@aa/app

  desktop:
    name: Desktop build (${{ matrix.os }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo / target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri
      - name: Linux system deps (Tauri v2 / WebKitGTK)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - run: npm ci
      - name: Build Tauri desktop bundle
        run: npm run tauri --workspace=@aa/app -- build
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: aa-desktop-${{ matrix.os }}
          path: |
            apps/app/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 7
